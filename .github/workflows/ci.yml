name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      SPARK_LOCAL_IP: 127.0.0.1
      SPARK_LOCAL_HOSTNAME: localhost
      PYSPARK_PYTHON: python
      PYSPARK_DRIVER_PYTHON: python
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Check Python syntax
        run: |
          python -m compileall src scripts dashboard orchestration

      - name: Run unit, quality, and integration tests
        env:
          PYTHONPATH: src
        run: |
          python -m pytest tests/unit tests/data_quality tests/integration -q

      - name: Run dashboard smoke test
        env:
          PYTHONPATH: src
        run: |
          python -c "import pandas, pyarrow, plotly.express, streamlit"
          python -c "from pathlib import Path; from bees_case.dashboard_data import load_demo_dashboard_data; data = load_demo_dashboard_data(Path('dashboard/demo_data')); assert len(data.gold) > 0"

      - name: Run PySpark smoke test
        run: |
          python scripts/run_local_pyspark_demo.py --output-dir ci_output --run-id ci-smoke-run --landing-date 2026-03-16
          test -d ci_output/gold/breweries_by_type_location
          test -d ci_output/ops/quality_results

      - name: Run Luigi orchestration smoke test
        run: |
          python -m luigi --module orchestration.luigi_pipeline PipelineOrchestration --local-scheduler --source-mode sample --source-file examples/sample_breweries.json --output-dir luigi_ci_output --landing-date 2026-03-16 --run-id luigi-ci-run
          test -f luigi_ci_output/_orchestration/pipeline_summary.json
